apiVersion: apps/v1
kind: Deployment
metadata:
  name: airbnb
spec:
  replicas: 3
  selector:
    matchLabels:
      app: airbnb
  template:
    metadata:
      labels:
        app: airbnb
    spec:
      containers:
        - name: airbnb
          image: airbnb:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: airbnb-config
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: airbnb
spec:
  type: NodePort
  selector:
    app: airbnb
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30001
